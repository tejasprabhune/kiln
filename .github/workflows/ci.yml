name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93"
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93"
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93"
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  test-e2e-verilator:
    name: e2e (verilator on ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93"
      - uses: Swatinem/rust-cache@v2
      - name: Cache slang build
        id: cache-slang-on-verilator
        uses: actions/cache@v4
        with:
          path: ~/.local/slang
          key: slang-v10.0-${{ matrix.os }}
      - name: Build slang from source
        if: steps.cache-slang-on-verilator.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt-get update
            sudo apt-get install -y cmake ninja-build g++
          fi
          git clone --depth 1 --branch v10.0 https://github.com/MikePopoloski/slang.git /tmp/slang-src
          cmake -S /tmp/slang-src -B /tmp/slang-src/build -DCMAKE_BUILD_TYPE=Release
          cmake --build /tmp/slang-src/build -j2
          mkdir -p ~/.local/slang/bin
          cp /tmp/slang-src/build/bin/slang ~/.local/slang/bin/
      - name: Add slang to PATH
        run: echo "$HOME/.local/slang/bin" >> "$GITHUB_PATH"
      - name: Install verilator (macOS)
        if: runner.os == 'macOS'
        run: brew install verilator
      - name: Cache verilator build (Linux)
        if: runner.os == 'Linux'
        id: cache-verilator
        uses: actions/cache@v4
        with:
          path: ~/.local/verilator
          key: verilator-v5.026-ubuntu-22.04
      - name: Build verilator from source (Linux)
        if: runner.os == 'Linux' && steps.cache-verilator.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y git make autoconf g++ flex bison libfl2 libfl-dev help2man
          git clone --depth 1 --branch v5.026 https://github.com/verilator/verilator.git /tmp/verilator-src
          cd /tmp/verilator-src
          autoconf
          ./configure --prefix="$HOME/.local/verilator"
          make -j"$(nproc)"
          make install
      - name: Add verilator to PATH (Linux)
        if: runner.os == 'Linux'
        run: echo "$HOME/.local/verilator/bin" >> "$GITHUB_PATH"
      - name: Install bender
        run: cargo install bender --version 0.31.0 --locked
      - name: Install verible (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          mkdir -p ~/.local/verible
          curl -sL -o /tmp/verible.tar.gz \
            "https://github.com/chipsalliance/verible/releases/download/v0.0-4053-g89d4d98a/verible-v0.0-4053-g89d4d98a-linux-static-x86_64.tar.gz"
          tar -xzf /tmp/verible.tar.gz -C ~/.local/verible --strip-components=1
          echo "$HOME/.local/verible/bin" >> "$GITHUB_PATH"
      - name: Install verible (macOS)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          mkdir -p ~/.local/verible
          curl -sL -o /tmp/verible.tar.gz \
            "https://github.com/chipsalliance/verible/releases/download/v0.0-4053-g89d4d98a/verible-v0.0-4053-g89d4d98a-macOS.tar.gz"
          tar -xzf /tmp/verible.tar.gz -C ~/.local/verible --strip-components=1
          echo "$HOME/.local/verible/bin" >> "$GITHUB_PATH"
      - name: Verify tools
        run: |
          slang --version
          verilator --version
          bender --version
          verible-verilog-format --version
      - name: Run kiln-cli e2e tests
        run: cargo test -p kiln-sv --features e2e

  test-e2e-slang:
    name: e2e (slang on ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93"
      - uses: Swatinem/rust-cache@v2
      - name: Cache slang build
        id: cache-slang
        uses: actions/cache@v4
        with:
          path: ~/.local/slang
          key: slang-v10.0-${{ matrix.os }}
      - name: Build slang from source
        if: steps.cache-slang.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt-get update
            sudo apt-get install -y cmake ninja-build g++
          fi
          git clone --depth 1 --branch v10.0 https://github.com/MikePopoloski/slang.git /tmp/slang-src
          cmake -S /tmp/slang-src -B /tmp/slang-src/build -DCMAKE_BUILD_TYPE=Release
          cmake --build /tmp/slang-src/build -j2
          mkdir -p ~/.local/slang/bin
          cp /tmp/slang-src/build/bin/slang ~/.local/slang/bin/
      - name: Add slang to PATH
        run: echo "$HOME/.local/slang/bin" >> "$GITHUB_PATH"
      - name: Verify slang
        run: slang --version
      - name: Run slang-rs e2e tests
        run: cargo test -p slang-sv-rs --features e2e
